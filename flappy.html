<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flappy Bird | Official</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #70c5ce;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 10px;
      color: white;
    }

    .game-container {
      width: 100%;
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 400px;
      height: 600px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      background: black;
    }

    @media (max-width: 500px) {
      iframe {
        width: 100%;
        height: 80vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <h1>🐤 Flappy Bird</h1>

  <div class="game-container">
    <iframe 
      src="https://gitallgames.github.io/projects/flappy-bird/index.html"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
